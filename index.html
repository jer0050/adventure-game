<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survival - Bug Attack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Red pulse effect kapag gabi at may bug */
      .night-danger { box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.2); }
    </script>
  </head>
  <body class="m-0 p-0 overflow-hidden bg-black">
    
    <div id="bg-layer" class="fixed inset-0 bg-no-repeat bg-center bg-[length:100%_100%] transition-all duration-[2000ms] ease-in-out" style="background-image: url('place1.png'); z-index: 0;"></div>

    <div id="game-container" class="relative w-screen h-screen transition-all duration-500" style="z-index: 10;">
      
      <img id="character" src="bottom.png" class="absolute w-20 h-auto [image-rendering:pixelated] transition-transform duration-75 animate-bounce" style="left: 50%; top: 50%;" />

      <div id="bug" class="absolute w-12 h-12 bg-red-600 rounded-full hidden flex items-center justify-center border-4 border-black shadow-lg" style="left: -100px; top: -100px;">
          <span class="text-white font-bold text-xs">BUG</span>
      </div>

      <div class="absolute top-5 left-5 bg-black/50 p-4 text-white font-mono rounded border border-white/20">
          <p id="status">TIME: DAY (SAFE)</p>
          <p id="survival-msg" class="text-yellow-400 hidden">SURVIVE THE BUG! 10s</p>
      </div>
    </div>

    <script type="text/javascript">
      const character = document.getElementById("character");
      const bgLayer = document.getElementById("bg-layer");
      const bug = document.getElementById("bug");
      const statusText = document.getElementById("status");
      const survivalMsg = document.getElementById("survival-msg");
      const gameContainer = document.getElementById("game-container");

      let x = window.innerWidth / 2, y = window.innerHeight / 2;
      let bugX = -100, bugY = -100;
      let speed = 8;
      let bugSpeed = 4;
      let keys = {};
      let isNight = false;
      let gameOver = false;

      window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
      window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

      function update() {
        if (gameOver) return;

        // Player Movement
        if (keys["d"] || keys["arrowright"]) { x += speed; character.src = "left.png"; }
        if (keys["a"] || keys["arrowleft"]) { x -= speed; character.src = "right.png"; }
        if (keys["s"] || keys["arrowdown"]) { y += speed; character.src = "bottom.png"; }
        if (keys["w"] || keys["arrowup"]) { y -= speed; character.src = "top.png"; }

        // Screen Boundaries
        x = Math.max(0, Math.min(x, window.innerWidth - 80));
        y = Math.max(0, Math.min(y, window.innerHeight - 80));

        character.style.left = x + "px";
        character.style.top = y + "px";

        // Bug AI (Susunod sa character kapag gabi)
        if (isNight) {
            let dx = x - bugX;
            let dy = y - bugY;
            let angle = Math.atan2(dy, dx);
            bugX += Math.cos(angle) * bugSpeed;
            bugY += Math.sin(angle) * bugSpeed;
            
            bug.style.left = bugX + "px";
            bug.style.top = bugY + "px";

            // Collision Detection (Check kung naabutan ka ng bug)
            let dist = Math.hypot(x - bugX, y - bugY);
            if (dist < 40) {
                gameOver = true;
                alert("GAME OVER! NAKAIN KA NG BUG.");
                window.location.reload();
            }
        }

        requestAnimationFrame(update);
      }

      requestAnimationFrame(update);

      /* --- SURVIVAL LOGIC (10 SECONDS) --- */

      setInterval(function(){
        if (!isNight) {
          // MAGIGING GABI (10 SECONDS START)
          isNight = true;
          bgLayer.style.filter = "brightness(0.2) hue-rotate(220deg)";
          gameContainer.classList.add("night-danger");
          statusText.innerText = "TIME: NIGHT (DANGER)";
          survivalMsg.classList.remove("hidden");

          // I-spawn ang Bug sa malayo
          bugX = Math.random() > 0.5 ? -50 : window.innerWidth + 50;
          bugY = Math.random() * window.innerHeight;
          bug.classList.remove("hidden");
          
          console.log("Night started: Survival for 10s");
        } else {
          // MAGIGING UMAGA (LIGTAS NA)
          isNight = false;
          bgLayer.style.filter = "brightness(1) hue-rotate(0deg)";
          gameContainer.classList.remove("night-danger");
          statusText.innerText = "TIME: DAY (SAFE)";
          survivalMsg.classList.add("hidden");
          bug.classList.add("hidden"); // Mawawala ang bug
          
          console.log("Day started: Bug retreated");
        }
      }, 10000); // 10 SECONDS CYCLE

      setTimeout(function(){
        console.log("Survival System Active: Watch out for the red bug at night!");
      }, 3000);

    </script>
  </body>
</html>
