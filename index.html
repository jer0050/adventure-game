<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind Adventure - Fixed Layers</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="m-0 p-0 overflow-hidden bg-black">
    
    <div
      id="bg-layer"
      class="fixed inset-0 bg-no-repeat bg-center bg-[length:100%_100%] transition-all duration-[3000ms] ease-in-out"
      style="background-image: url('place1.png'); z-index: 0;"
    ></div>

    <div id="game-container" class="relative w-screen h-screen" style="z-index: 10;">
      
      <div
        id="teleport-box"
        class="absolute right-[21%] top-[15%] w-[6%] h-[10%]"
      ></div>

      <img
        id="character"
        src="bottom.png"
        class="absolute w-24 h-auto [image-rendering:pixelated] transition-transform duration-75 animate-bounce ease-in-out"
        style="will-change: left, top; left: 15%; top: 15%;"
      />
    </div>

    <script type="text/javascript">
      const character = document.getElementById("character");
      const bgLayer = document.getElementById("bg-layer");

      // Starting position
      let x = window.innerWidth * 0.15;
      let y = window.innerHeight * 0.15;
      let speed = 10;
      let keys = {};
      let isRedirecting = false;
      let isNight = false;

      // Event Listeners for Movement
      window.addEventListener("keydown", (e) => {
        keys[e.key.toLowerCase()] = true;
      });
      window.addEventListener("keyup", (e) => {
        keys[e.key.toLowerCase()] = false;
      });

      function update() {
        if (isRedirecting) return;

        // Move Right/Left
        if (keys["d"] || keys["arrowright"]) {
          x += speed;
          character.src = "left.png";
        } else if (keys["a"] || keys["arrowleft"]) {
          x -= speed;
          character.src = "right.png";
        }

        // Move Up/Down
        if (keys["s"] || keys["arrowdown"]) {
          y += speed;
          character.src = "bottom.png";
        } else if (keys["w"] || keys["arrowup"]) {
          y -= speed;
          character.src = "top.png";
        }

        // Keep character inside screen
        x = Math.max(0, Math.min(x, window.innerWidth - 100));
        y = Math.max(0, Math.min(y, window.innerHeight - 100));

        // Update Position
        character.style.left = x + "px";
        character.style.top = y + "px";

        // Teleport Logic
        let px = (x / window.innerWidth) * 100;
        let py = (y / window.innerHeight) * 100;

        if (px > 70 && px < 78 && py > 12 && py < 22) {
          isRedirecting = true;
          window.location.href = "kiko.html";
          return;
        }

        requestAnimationFrame(update);
      }

      // Simulan ang Loop
      requestAnimationFrame(update);

      /* --- INSERTED SYNTAX FOR DAY & NIGHT --- */

      // SETINTERVAL: Paulit-ulit na pagdilim at pagliwanag ng BACKGROUND LANG
      setInterval(function(){
        if (!isNight) {
          // Gabi Mode: Madilim ang background, character mananatiling maliwanag
          bgLayer.style.filter = "brightness(0.3) hue-rotate(210deg) saturate(1.2)";
          console.log("Night Mode On");
        } else {
          // Umaga Mode: Normal brightness
          bgLayer.style.filter = "brightness(1) hue-rotate(0deg) saturate(1)";
          console.log("Day Mode On");
        }
        isNight = !isNight;
      }, 3000);

      // SETTIMEOUT: Isang beses na check matapos ang 3 segundo
      setTimeout(function(){
        console.log("System Check: Character is safe from background filters.");
      }, 3000);

    </script>
  </body>
</html>
