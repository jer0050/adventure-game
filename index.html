<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      #bug { 
        width: 40px; height: 40px; 
        background: url('https://cdn-icons-png.flaticon.com/512/535/535213.png') no-repeat center;
        background-size: contain;
        filter: drop-shadow(0 0 10px red);
      }
    </style>
  </head>
  <body class="m-0 p-0 overflow-hidden bg-black font-mono">
    
    <div id="bg-layer" class="fixed inset-0 bg-no-repeat bg-center bg-[length:100%_100%] transition-all duration-[2000ms]" 
         style="background-image: url('place1.png'); z-index: 0;"></div>

    <div id="death-screen" class="fixed inset-0 bg-black/80 z-[100] hidden flex flex-col items-center justify-center">
        <h1 class="text-red-600 text-6xl font-black mb-4">GAME OVER</h1>
        <button onclick="location.reload()" class="px-8 py-3 bg-red-600 text-white font-bold rounded-full hover:bg-red-500 transition-colors">RESTART</button>
    </div>

    <div class="relative w-screen h-screen" style="z-index: 10;">
      <img id="character" src="bottom.png" class="absolute w-20 h-auto z-20" style="left: 100px; top: 100px;" />
      <div id="bug" class="absolute hidden z-30 animate-pulse"></div>

      <div class="absolute top-5 left-5 bg-black/70 p-4 text-white border-2 border-green-600 rounded">
          <h2 id="time-status" class="text-xl font-bold text-green-400">STATUS: DAY (SAFE)</h2>
          <p>Avoid the bug at night!</p>
      </div>
    </div>

    <script type="text/javascript">
      const char = document.getElementById("character");
      const bg = document.getElementById("bg-layer");
      const bug = document.getElementById("bug");
      const status = document.getElementById("time-status");
      const deathScreen = document.getElementById("death-screen");

      let x = 100, y = 100, bx = -100, by = -100;
      let speed = 9, bugSpeed = 1.2;
      let isNight = false, isDead = false;
      let keys = {};

      window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
      window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

      function loop() {
        if (isDead) return;

        if (keys["d"] || keys["arrowright"]) { x += speed; char.src = "left.png"; }
        if (keys["a"] || keys["arrowleft"]) { x -= speed; char.src = "right.png"; }
        if (keys["w"] || keys["arrowup"]) { y -= speed; char.src = "top.png"; }
        if (keys["s"] || keys["arrowdown"]) { y += speed; char.src = "bottom.png"; }

        char.style.left = x + "px";
        char.style.top = y + "px";

        if (isNight) {
            if (bx < x) bx += bugSpeed; else bx -= bugSpeed;
            if (by < y) by += bugSpeed; else by -= bugSpeed;

            bug.style.left = bx + "px";
            bug.style.top = by + "px";

            let dist = Math.sqrt(Math.pow(x - bx, 2) + Math.pow(y - by, 2));
            if (dist < 30) { 
                isDead = true;
                deathScreen.classList.remove("hidden");
            }
        }
        requestAnimationFrame(loop);
      }
      loop();

      setInterval(function(){
        if(isDead) return;
        isNight = !isNight;
        if (isNight) {
          bg.style.filter = "brightness(0.2) hue-rotate(200deg)";
          status.innerText = "STATUS: NIGHT (DANGER!)";
          status.classList.replace("text-green-400", "text-red-500");
          bx = Math.random() > 0.5 ? -50 : window.innerWidth;
          by = Math.random() * window.innerHeight;
          bug.classList.remove("hidden");
        } else {
          bg.style.filter = "brightness(1) hue-rotate(0deg)";
          status.innerText = "STATUS: DAY (SAFE)";
          status.classList.replace("text-red-500", "text-green-400");
          bug.classList.add("hidden");
        }
      }, 10000);

      setTimeout(function(){
          console.log("Survival active - Alert disabled, UI enabled.");
      }, 3000);
    </script>
  </body>
</html>
