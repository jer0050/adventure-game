<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind Adventure - Day & Night Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="m-0 p-0 overflow-hidden bg-black">
    
    <div
      id="bg-layer"
      class="absolute inset-0 bg-no-repeat bg-center bg-[length:100%_100%] transition-all duration-[3000ms] ease-in-out z-0"
      style="background-image: url(place1.png)"
    ></div>

    <div id="game-container" class="relative w-screen h-screen z-10">
      <div
        id="teleport-box"
        class="absolute right-[21%] top-[15%] w-[6%] h-[10%]"
      ></div>

      <img
        id="character"
        src="bottom.png"
        class="absolute w-24 h-auto [image-rendering:pixelated] transition-transform duration-75 animate-bounce ease-in-out"
        style="will-change: left, top"
      />
    </div>

    <script type="text/javascript">
      const character = document.getElementById("character");
      const bgLayer = document.getElementById("bg-layer");

      let x = window.innerWidth * 0.15;
      let y = window.innerHeight * 0.15;
      let speed = 10;
      let keys = {};
      let isRedirecting = false;
      let isNight = false;

      window.addEventListener("keydown", (e) => (keys[e.key.toLowerCase()] = true));
      window.addEventListener("keyup", (e) => (keys[e.key.toLowerCase()] = false));

      function update() {
        if (isRedirecting) return;

        if (keys["d"] || keys["arrowright"]) {
          x += speed;
          character.src = "left.png";
        } else if (keys["a"] || keys["arrowleft"]) {
          x -= speed;
          character.src = "right.png";
        }

        if (keys["s"] || keys["arrowdown"]) {
          y += speed;
          character.src = "bottom.png";
        } else if (keys["w"] || keys["arrowup"]) {
          y -= speed;
          character.src = "top.png";
        }

        x = Math.max(0, Math.min(x, window.innerWidth - 80));
        y = Math.max(0, Math.min(y, window.innerHeight - 80));

        character.style.left = `${x}px`;
        character.style.top = `${y}px`;

        let px = (x / window.innerWidth) * 100;
        let py = (y / window.innerHeight) * 100;

        if (px > 70 && px < 78 && py > 12 && py < 22) {
          isRedirecting = true;
          window.location.href = "kiko.html";
          return;
        }

        requestAnimationFrame(update);
      }

      requestAnimationFrame(update);

      /* --- DAY AND NIGHT LOGIC (Background Only) --- */

      setInterval(function() {
        if (!isNight) {
          // Background lang ang didilim
          bgLayer.style.filter = "brightness(0.3) hue-rotate(200deg)";
        } else {
          // Balik sa normal ang background
          bgLayer.style.filter = "brightness(1) hue-rotate(0deg)";
        }
        isNight = !isNight;
      }, 3000);

      setTimeout(function() {
        console.log("Visual layers separated.");
      }, 3000);

    </script>
  </body>
</html>
